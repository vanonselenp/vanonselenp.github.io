<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
  </style>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" rx="12"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)" rx="12"/>

  <!-- Step 1: Explore -->
  <g transform="translate(105, 130)">
    <rect x="-65" y="-30" width="130" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#e94560" font-size="16" font-weight="700">Explore</text>
  </g>

  <!-- Step 2: Plan -->
  <g transform="translate(295, 130)">
    <rect x="-65" y="-30" width="130" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#e94560" font-size="16" font-weight="700">Plan</text>
  </g>

  <!-- Step 3: Set Up -->
  <g transform="translate(485, 130)">
    <rect x="-65" y="-30" width="130" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#e94560" font-size="16" font-weight="700">Set Up</text>
  </g>

  <!-- Step 4: Build -->
  <g transform="translate(675, 130)">
    <rect x="-65" y="-30" width="130" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#e94560" font-size="16" font-weight="700">Build</text>
  </g>

  <!-- Step 5: Verify -->
  <g transform="translate(675, 310)">
    <rect x="-65" y="-30" width="130" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#e94560" font-size="16" font-weight="700">Verify</text>
  </g>

  <!-- Arrows: Explore → Plan -->
  <line x1="170" y1="130" x2="220" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrows: Plan → Set Up -->
  <line x1="360" y1="130" x2="410" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrows: Set Up → Build -->
  <line x1="550" y1="130" x2="600" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrows: Build → Verify -->
  <line x1="675" y1="190" x2="675" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Return arrow: Verify back to Explore (curved path underneath) -->
  <path d="M 610 310 L 200 310 Q 105 310 105 250 L 105 200" 
        fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow)"/>

  <!-- Annotations under each step -->
  <text x="105" y="205" text-anchor="middle" fill="#94a3b8" font-size="11">Talk to the AI.</text>
  <text x="105" y="220" text-anchor="middle" fill="#94a3b8" font-size="11">What language?</text>
  <text x="105" y="235" text-anchor="middle" fill="#94a3b8" font-size="11">What approach?</text>

  <text x="295" y="205" text-anchor="middle" fill="#94a3b8" font-size="11">Acceptance criteria.</text>
  <text x="295" y="220" text-anchor="middle" fill="#94a3b8" font-size="11">Example data.</text>
  <text x="295" y="235" text-anchor="middle" fill="#94a3b8" font-size="11">Small chunks.</text>

  <text x="485" y="205" text-anchor="middle" fill="#94a3b8" font-size="11">Fresh repo.</text>
  <text x="485" y="220" text-anchor="middle" fill="#94a3b8" font-size="11">Agent file.</text>
  <text x="485" y="235" text-anchor="middle" fill="#94a3b8" font-size="11">Context window.</text>

  <text x="675" y="205" text-anchor="middle" fill="#94a3b8" font-size="11">Incremental.</text>
  <text x="675" y="220" text-anchor="middle" fill="#94a3b8" font-size="11">Test-driven.</text>

  <text x="675" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">Read the code.</text>
  <text x="675" y="400" text-anchor="middle" fill="#94a3b8" font-size="11">Run it.</text>
  <text x="675" y="415" text-anchor="middle" fill="#94a3b8" font-size="11">Does it work?</text>

  <!-- Loop label on the return path -->
  <text x="350" y="355" text-anchor="middle" fill="#64748b" font-size="12" font-style="italic">delete the code. do it again.</text>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">The Agentic Kata Loop</text>
  <text x="400" y="70" text-anchor="middle" fill="#64748b" font-size="13">the thing you build doesn't matter. the process you use to build it does.</text>

  <!-- Bottom annotation -->
  <text x="400" y="460" text-anchor="middle" fill="#475569" font-size="11">github.com/vanonselenp/agentic-katas</text>
</svg>
